name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bunx biome check src
      - run: bun bin/css-bash.ts --version
      - run: echo 'whatsnew 2024' | bun bin/css-bash.ts --repl --pipe || true
